<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnCa - Full 160 Shuffle</title>
    <link rel="apple-touch-icon" href="image.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #e0e5ec;
            --shadow: 7px 7px 14px #bec8d9, -7px -7px 14px #ffffff;
            --inner-shadow: inset 4px 4px 8px #bec8d9, inset -4px -4px 8px #ffffff;
            --accent: #4A90E2;
            --correct: #34c759;
            --wrong: #ff3b30;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; min-height: 100vh;
        }
        .stats-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .stat-card { flex: 1; padding: 10px; background: var(--bg); border-radius: 12px; box-shadow: var(--shadow); text-align: center; font-size: 14px; font-weight: bold; }
        
        .game-container { display: flex; gap: 15px; width: 100%; max-width: 600px; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .column-title { text-align: center; font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }

        .card {
            min-height: 70px; background: var(--bg); padding: 10px; border-radius: 12px; box-shadow: var(--shadow);
            display: flex; align-items: center; justify-content: center; text-align: center;
            font-size: 13px; font-weight: 500; cursor: pointer; color: #333;
            transition: opacity 1.2s ease, background-color 0.4s;
        }
        .card.selected { box-shadow: var(--inner-shadow); color: var(--accent); }
        .card.matched { background-color: var(--correct); color: white; pointer-events: none; box-shadow: none; opacity: 0.3; }
        .card.ghost-out { opacity: 0; pointer-events: none; }
        .card.error-anim { background-color: var(--wrong); color: white; }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-card">✅ <span id="correct-count">0</span></div>
        <div class="stat-card">❌ <span id="wrong-count">0</span></div>
        <div class="stat-card" style="color: var(--accent)">📦 <span id="pool-count">0</span></div>
    </div>

    <div id="game-ui" class="game-container">
        <div id="en-column" class="column"><div class="column-title">English</div></div>
        <div id="ru-column" class="column"><div class="column-title">Русский</div></div>
    </div>

    <script>
        // ТВОЙ ПОЛНЫЙ СПИСОК (убедись, что тут все 160 слов)
        const allWords = [
            { en: "It slipped my mind", ru: "Вылетело из головы" },
            { en: "That's on me", ru: "Я виноват" },
            { en: "Cut it out", ru: "Прекрати это" },
            { en: "After you", ru: "После вас" },
            { en: "I'm easy", ru: "Я за любой вариант" },
            { en: "Not much", ru: "Ничего особенного" },
            { en: "Keep in touch", ru: "На связи" },
            { en: "Take it easy", ru: "Расслабься" }
            // ... добавь остальные фразы здесь
        ];

        let pool = [];
        let selectedCards = [];
        let correctScore = 0;
        let wrongScore = 0;

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        // Алгоритм идеального перемешивания
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function refreshPool() {
            pool = shuffle([...allWords]);
            updateStats();
        }

        function updateStats() {
            document.getElementById('pool-count').textContent = pool.length;
            document.getElementById('correct-count').textContent = correctScore;
            document.getElementById('wrong-count').textContent = wrongScore;
        }

        function initRound() {
            if (pool.length < 6) refreshPool();

            const enCol = document.getElementById('en-column');
            const ruCol = document.getElementById('ru-column');
            
            // Чистим старые карточки
            Array.from(enCol.children).forEach(child => { if(!child.classList.contains('column-title')) child.remove(); });
            Array.from(ruCol.children).forEach(child => { if(!child.classList.contains('column-title')) child.remove(); });

            let roundWords = pool.splice(0, 6);
            let shuffledRu = shuffle([...roundWords]);

            roundWords.forEach(p => enCol.appendChild(createCard(p.en, p.en, 'en')));
            shuffledRu.forEach(p => ruCol.appendChild(createCard(p.ru, p.en, 'ru')));
            updateStats();
        }

        function createCard(text, pairId, lang) {
            const card = document.createElement('div');
            card.className = 'card';
            card.textContent = text;
            card.dataset.lang = lang;
            card.dataset.pairId = pairId;
            card.onclick = () => handleCardClick(card);
            return card;
        }

        function handleCardClick(card) {
            if (card.classList.contains('selected') || card.classList.contains('matched')) return;

            // Логика переключения выбора
            if (selectedCards.length === 1 && selectedCards[0].dataset.lang === card.dataset.lang) {
                selectedCards[0].classList.remove('selected');
                selectedCards = [card];
                card.classList.add('selected');
                if (card.dataset.lang === 'en') speak(card.textContent);
                return;
            }

            if (card.dataset.lang === 'en') speak(card.textContent);
            card.classList.add('selected');
            selectedCards.push(card);

            if (selectedCards.length === 2) {
                const [c1, c2] = selectedCards;
                if (c1.dataset.pairId === c2.dataset.pairId) {
                    correctScore++;
                    c1.classList.replace('selected', 'matched');
                    c2.classList.replace('selected', 'matched');
                    checkRoundEnd();
                } else {
                    wrongScore++;
                    c1.classList.add('error-anim');
                    c2.classList.add('error-anim');
                    setTimeout(() => {
                        c1.classList.remove('selected', 'error-anim');
                        c2.classList.remove('selected', 'error-anim');
                    }, 400);
                }
                selectedCards = [];
                updateStats();
            }
        }

        function checkRoundEnd() {
            if (document.querySelectorAll('.card:not(.matched):not(.column-title)').length === 0) {
                setTimeout(() => {
                    document.querySelectorAll('.card:not(.column-title)').forEach(c => c.classList.add('ghost-out'));
                    setTimeout(initRound, 1200);
                }, 600);
            }
        }

        // Старт
        refreshPool();
        initRound();
    </script>
</body>
</html>

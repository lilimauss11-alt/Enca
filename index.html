<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English 3D</title>
    
    <!-- Настройки PWA для iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- ВАША ИКОНКА -->
    <link rel="apple-touch-icon" href="https://r2.erweima.ai/i/1746132034938634842.png">

    <style>
        :root {
            --bg: #e0e5ec;
            --card-bg: #e0e5ec;
            --shadow: 7px 7px 14px #bec8d9, -7px -7px 14px #ffffff;
            --inner-shadow: inset 4px 4px 8px #bec8d9, inset -4px -4px 8px #ffffff;
            --accent: #4A90E2;
            --correct: #34c759;
            --wrong: #ff3b30;
        }

        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            padding-top: 65px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 { 
            font-size: 22px; 
            color: #444; 
            margin-bottom: 25px; 
            font-weight: 800;
            text-shadow: 1px 1px 0px #fff;
        }

        .game-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        .column { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 12px 8px;
            text-align: center;
            font-size: 15px;
            font-weight: 700;
            color: #555;
            box-shadow: var(--shadow);
            border: none;
            transition: all 0.15s ease;
            min-height: 80px; /* Увеличенная высота для пальцев */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            line-height: 1.2;
        }

        .card:active {
            box-shadow: var(--inner-shadow);
            transform: scale(0.96);
        }

        .card.selected {
            color: var(--accent);
            box-shadow: var(--inner-shadow);
            background: #e6eef7;
        }

        .card.correct {
            background: var(--correct) !important;
            color: white !important;
            box-shadow: none;
            transform: scale(0.98);
        }

        .card.wrong {
            background: var(--wrong) !important;
            color: white !important;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .progress { 
            margin-top: auto;
            padding: 30px 0;
            font-size: 14px; 
            font-weight: 600;
            color: #888; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>English Practice</h1>

    <div class="game-container">
        <div class="column" id="en-col"></div>
        <div class="column" id="ru-col"></div>
    </div>

    <div class="progress" id="stat">Угадано: 0</div>

    <script>
        const allWords = [
            {en: "What's up", ru: "Как дела"}, {en: "Not much", ru: "Ничего особенного"}, {en: "Here we go", ru: "Поехали"}, {en: "There you go", ru: "Вот так"}, {en: "Hang on", ru: "Подожди"}, {en: "Come on", ru: "Да ладно"}, {en: "Go ahead", ru: "Давай"}, {en: "After you", ru: "После вас"}, {en: "No way out", ru: "Нет выхода"}, {en: "Long story", ru: "Долгая история"},
            {en: "What do you mean", ru: "Что ты имеешь в виду"}, {en: "Say that again", ru: "Повтори"}, {en: "What was that", ru: "Что это было"}, {en: "Can you repeat", ru: "Повторишь"}, {en: "I didn't get that", ru: "Я не понял"}, {en: "Sorry, what", ru: "Прости, что"}, {en: "Come again", ru: "Повтори ещё раз"}, {en: "What's that", ru: "Что это"}, {en: "Explain, please", ru: "Объясни, пожалуйста"}, {en: "Say it slower", ru: "Говори медленнее"},
            {en: "I'm busy", ru: "Я занят"}, {en: "I'm home", ru: "Я дома"}, {en: "I'm outside", ru: "Я на улице"}, {en: "I'm coming", ru: "Я иду"}, {en: "I'm leaving", ru: "Я ухожу"}, {en: "I'm back", ru: "Я вернулся"}, {en: "I'm here", ru: "Я здесь"}, {en: "I'm ready", ru: "Я готов"}, {en: "I'm late", ru: "Я опоздал"}, {en: "I'm early", ru: "Я рано"}, {en: "I'm shocked", ru: "Я в шоке"},
            {en: "Wake up", ru: "Просыпаться"}, {en: "Get up", ru: "Вставать"}, {en: "Stand up", ru: "Встать (со стула)"}, {en: "Cheer up", ru: "Не грусти"}, {en: "Grow up", ru: "Взрослеть"}, {en: "Show up", ru: "Появиться"}, {en: "Set up", ru: "Организовать"}, {en: "Pick up", ru: "Забрать"}, {en: "Clean up", ru: "Убирать"}, {en: "Save up", ru: "Копить"}, {en: "Speak up", ru: "Говори громче"}, {en: "Give up", ru: "Сдаваться"}, {en: "Make up", ru: "Помириться"}, {en: "Bring up", ru: "Воспитывать"}, {en: "Hang up", ru: "Повесить трубку"},
            {en: "Go out", ru: "Выходить в свет"}, {en: "Find out", ru: "Выяснить"}, {en: "Figure out", ru: "Разобраться"}, {en: "Fill out", ru: "Заполнить форму"}, {en: "Check out", ru: "Зацени"}, {en: "Hand out", ru: "Раздавать"}, {en: "Work out", ru: "Тренироваться"}, {en: "Run out of", ru: "Закончиться"}, {en: "Chill out", ru: "Расслабься"}, {en: "Drop out", ru: "Бросить учёбу"}, {en: "Carry out", ru: "Выполнить"}, {en: "Point out", ru: "Указать"}, {en: "Cut out", ru: "Прекратить"}, {en: "Take out", ru: "Выносить мусор"}, {en: "Sort out", ru: "Уладить"},
            {en: "Look after", ru: "Присматривать за"}, {en: "Look for", ru: "Искать"}, {en: "Look at", ru: "Смотреть на"}, {en: "Look into", ru: "Расследовать"}, {en: "Look forward to", ru: "Ждать с нетерпением"}, {en: "Get along", ru: "Ладить с"}, {en: "Break up", ru: "Расстаться"}, {en: "Fall in love", ru: "Влюбиться"}, {en: "Come over", ru: "Зайти в гости"}, {en: "Set aside", ru: "Отложить"}, {en: "Sign up", ru: "Зарегистрироваться"}, {en: "Pick out", ru: "Выбрать"},
            {en: "Turn off", ru: "Выключить"}, {en: "Cut off", ru: "Прервать связь"}, {en: "Take off", ru: "Снять / Взлетать"}, {en: "Drop off", ru: "Подвезти"}, {en: "Pay off", ru: "Окупиться"}, {en: "Show off", ru: "Хвастаться"}, {en: "Go off", ru: "Сработать"}, {en: "Put off", ru: "Откладывать"}, {en: "Get off", ru: "Выходить"},
            {en: "Turn on", ru: "Включить"}, {en: "Put on", ru: "Надевать"}, {en: "Log on", ru: "Войти в систему"}, {en: "Hold on", ru: "Подожди"}, {en: "Go on", ru: "Продолжать"}, {en: "Try on", ru: "Примерять"},
            {en: "Come back", ru: "Возвращаться"}, {en: "Pay back", ru: "Вернуть долг"}, {en: "Call back", ru: "Перезвонить"}, {en: "Bring back", ru: "Вернуть"}, {en: "Take back", ru: "Забрать обратно"},
            {en: "So weird", ru: "Такое странное"}, {en: "Too much", ru: "Слишком"}, {en: "I'm tired of this", ru: "Я устал от этого"}, {en: "I love this", ru: "Мне это нравится"}, {en: "I don't like it", ru: "Мне это не нравится"}, {en: "So sad", ru: "Очень грустно"}, {en: "I'm stressed", ru: "Я в стрессе"}, {en: "I'm relaxed", ru: "Я расслаблен"}, {en: "It's annoying", ru: "Это раздражает"}, {en: "I’m easy", ru: "Мне все равно"},
            {en: "How come", ru: "Как так?"}, {en: "What for", ru: "Зачем?"}, {en: "Why not", ru: "Почему бы и нет?"}, {en: "Who knows", ru: "Кто знает?"}, {en: "Where to", ru: "Куда?"}, {en: "How so", ru: "Почему так?"}, {en: "What now", ru: "И что теперь?"}, {en: "Anything else", ru: "Что-то ещё?"}, {en: "What's wrong", ru: "Что случилось?"}, {en: "All good", ru: "Всё в порядке"}, {en: "What’s your 20", ru: "Где ты?"},
            {en: "Right now", ru: "Прямо сейчас"}, {en: "Later on", ru: "Потом"}, {en: "In a bit", ru: "Через минутку"}, {en: "All day", ru: "Весь день"}, {en: "Every day", ru: "Каждый день"}, {en: "Not today", ru: "Не сегодня"}, {en: "Maybe later", ru: "Может позже"}, {en: "Too late", ru: "Слишком поздно"}, {en: "Let's meet", ru: "Давай встретимся"}, {en: "Time's up", ru: "Время вышло"}, {en: "Then", ru: "Затем"}, {en: "A lush", ru: "Алкаш"}, {en: "A moron", ru: "Дебил"}, {en: "A slowpoke", ru: "Тормоз"}, {en: "A wimp", ru: "Тряпка"},
            {en: "Turn it off", ru: "Выключи"}, {en: "Turn it on", ru: "Включи"}, {en: "Check it out", ru: "Зацени"}, {en: "Listen up", ru: "Слушай"}, {en: "Calm down", ru: "Успокойся"}, {en: "Don't worry", ru: "Не волнуйся"}, {en: "Follow me", ru: "Иди за мной"}, {en: "Leave it", ru: "Оставишь"}, {en: "Move on", ru: "Идем дальше"}, {en: "Get out", ru: "Уходи"},
            {en: "It depends", ru: "Зависит"}, {en: "That's fine", ru: "Это нормально"}, {en: "It's risky", ru: "Это рискованно"}, {en: "So easy", ru: "Так просто"}, {en: "Too hard", ru: "Слишком сложно"}, {en: "Worth it", ru: "Оно того стоит"}, {en: "Not worth it", ru: "Не стоит"}, {en: "Sounds bad", ru: "Звучит плохо"}, {en: "No idea", ru: "Без понятия"}, {en: "Can't tell", ru: "Не могу сказать"}, {en: "Kinda", ru: "Типа того"},
            {en: "I don't care", ru: "Мне всё равно"}, {en: "Whatever you say", ru: "Как скажешь"}, {en: "You started it", ru: "Ты начал"}, {en: "That's not true", ru: "Это неправда"}, {en: "I doubt it", ru: "Сомневаюсь"}, {en: "You wish", ru: "Мечтай"}, {en: "Not my fault", ru: "Не моя вина"}, {en: "Don't blame me", ru: "Не обвиняй меня"}, {en: "Let it go", ru: "Забудь"}, {en: "Drop it", ru: "Оставь это"}, {en: "Could I have", ru: "Могу ли я"}, {en: "That’s why", ru: "Потому что"}, {en: "Don’t trip", ru: "Не твоё дело"}, {en: "He didn't make it", ru: "Он не выжил"}, {en: "Still young", ru: "Всё ещё молодой"},
            {en: "I am boring", ru: "Я скучный"}, {en: "I’m Broke", ru: "Нет денег"}, {en: "I’m running late", ru: "Я опаздываю"}, {en: "That works", ru: "Договорились"}, {en: "I am interesting", ru: "Я интересный"}, {en: "Make yourself at home", ru: "Будь как дома"}, {en: "It slipped my mind", ru: "Вылетело из головы"}, {en: "That's on me", ru: "Это из-за меня"}, {en: "Let me get back to you", ru: "Дам ответ позже"}, {en: "I'm all set", ru: "Нет, спасибо"}, {en: "It is what it is", ru: "Что есть, то есть"}
        ];

        let selectedEn = null, selectedRu = null, matches = 0, totalLearned = 0;
        let currentRoundWords = [];

        function initRound() {
            const shuffled = [...allWords].sort(() => 0.5 - Math.random());
            currentRoundWords = shuffled.slice(0, 5);
            matches = 0;

            const enCol = document.getElementById('en-col');
            const ruCol = document.getElementById('ru-col');
            enCol.innerHTML = ''; ruCol.innerHTML = '';

            const ens = [...currentRoundWords].sort(() => 0.5 - Math.random());
            const rus = [...currentRoundWords].sort(() => 0.5 - Math.random());

            ens.forEach(w => enCol.appendChild(createCard(w.en, 'en')));
            rus.forEach(w => ruCol.appendChild(createCard(w.ru, 'ru')));
        }

        function createCard(text, type) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerText = text;
            div.onclick = () => {
                if (div.classList.contains('correct')) return;
                if (type === 'en') {
                    document.querySelectorAll('#en-col .card').forEach(c => c.classList.remove('selected'));
                    selectedEn = {el: div, text};
                } else {
                    document.querySelectorAll('#ru-col .card').forEach(c => c.classList.remove('selected'));
                    selectedRu = {el: div, text};
                }
                div.classList.add('selected');
                if (selectedEn && selectedRu) check();
            };
            return div;
        }

        function check() {
            const match = currentRoundWords.find(w => w.en === selectedEn.text && w.ru === selectedRu.text);
            if (match) {
                selectedEn.el.className = 'card correct';
                selectedRu.el.className = 'card correct';
                matches++;
                totalLearned++;
                document.getElementById('stat').innerText = `Угадано: ${totalLearned}`;
                if (matches === 5) setTimeout(initRound, 800);
            } else {
                const e = selectedEn.el, r = selectedRu.el;
                e.classList.add('wrong'); r.classList.add('wrong');
                setTimeout(() => { e.className = 'card'; r.className = 'card'; }, 500);
            }
            selectedEn = null; selectedRu = null;
        }

        initRound();
    </script>
</body>
</html>

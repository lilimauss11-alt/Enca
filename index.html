<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnCa Marathon Final Fix</title>
    
    <link rel="apple-touch-icon" href="image.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #e0e5ec;
            --shadow: 7px 7px 14px #bec8d9, -7px -7px 14px #ffffff;
            --inner-shadow: inset 4px 4px 8px #bec8d9, inset -4px -4px 8px #ffffff;
            --accent: #4A90E2;
            --correct: #34c759;
            --wrong: #ff3b30;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; min-height: 100vh;
        }
        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .stat-card { flex: 1; padding: 15px; background: var(--bg); border-radius: 15px; box-shadow: var(--shadow); text-align: center; font-weight: bold; }
        
        .game-container { display: flex; gap: 15px; width: 100%; max-width: 600px; transition: opacity 1s; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .column-title { text-align: center; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; }

        .card {
            min-height: 70px; background: var(--bg); padding: 12px 8px; border-radius: 12px; box-shadow: var(--shadow);
            display: flex; align-items: center; justify-content: center; text-align: center;
            font-size: 13px; font-weight: 500; cursor: pointer; border: 2px solid transparent; color: #333;
            transition: opacity 2.0s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.6s ease;
        }
        .card.selected { box-shadow: var(--inner-shadow); color: var(--accent); }
        .card.matched { background-color: var(--correct); color: white; pointer-events: none; box-shadow: none; }
        .card.ghost-out { opacity: 0; pointer-events: none; }
        .card.error-anim { background-color: var(--wrong); color: white; transition: 0.3s; }

        #result-screen {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 350px; background: var(--bg); border-radius: 30px;
            box-shadow: var(--shadow); padding: 30px; text-align: center;
            display: none; flex-direction: column; gap: 20px; z-index: 100;
            opacity: 0; transition: opacity 2s ease;
        }
        .res-val { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .btn-restart {
            padding: 15px; border-radius: 15px; border: none; background: var(--bg);
            box-shadow: var(--shadow); color: var(--accent); font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        .btn-restart:active { box-shadow: var(--inner-shadow); }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-card">✅ <span id="correct-count">0</span></div>
        <div class="stat-card">❌ <span id="wrong-count">0</span></div>
    </div>

    <div id="game-ui" class="game-container">
        <div id="en-column" class="column"><div class="column-title">English</div></div>
        <div id="ru-column" class="column"><div class="column-title">Русский</div></div>
    </div>

    <div id="result-screen">
        <h2>Марафон завершен!</h2>
        <div style="color: var(--correct)">Верно: <div id="final-ok" class="res-val">0</div></div>
        <div style="color: var(--wrong)">Ошибок: <div id="final-err" class="res-val">0</div></div>
        <button class="btn-restart" onclick="restartGame()">Начать заново</button>
    </div>

    <script>
        const allWords = [
            { en: "It slipped my mind", ru: "Вылетело из головы" },
            { en: "That's on me", ru: "Я виноват / Моя вина" },
            { en: "Cut it out", ru: "Прекрати это" },
            { en: "After you", ru: "После вас" },
            { en: "I'm easy", ru: "Я за любой вариант" },
            { en: "Not much", ru: "Ничего особенного" },
            { en: "Keep in touch", ru: "На связи" },
            { en: "Take it easy", ru: "Расслабься" }
            // Ваш список из 160 слов
        ];

        let pool = [];
        let correctScore = 0;
        let wrongScore = 0;
        let selectedCards = [];

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        function initRound() {
            // Если в мешочке совсем пусто - выходим (результаты покажет checkRoundEnd)
            if (pool.length === 0) return;

            const enCol = document.getElementById('en-column');
            const ruCol = document.getElementById('ru-column');
            enCol.querySelectorAll('.card').forEach(c => c.remove());
            ruCol.querySelectorAll('.card').forEach(c => c.remove());

            // Берем 6 слов или столько, сколько осталось в мешочке
            let count = Math.min(6, pool.length);
            let roundWords = pool.splice(0, count);
            let shuffledRu = [...roundWords].sort(() => 0.5 - Math.random());

            roundWords.forEach(p => enCol.appendChild(createCard(p.en, p.en, 'en')));
            shuffledRu.forEach(p => ruCol.appendChild(createCard(p.ru, p.en, 'ru')));
        }

        function createCard(text, pairId, lang) {
            const card = document.createElement('div');
            card.className = 'card';
            card.textContent = text;
            card.dataset.lang = lang;
            card.dataset.pairId = pairId;
            card.style.opacity = "0";
            card.onclick = () => handleCardClick(card);
            setTimeout(() => card.style.opacity = "1", 100);
            return card;
        }

        function handleCardClick(card) {
            if (card.classList.contains('selected') || card.classList.contains('matched')) return;

            // Логика переключения внутри одного столбца
            if (selectedCards.length === 1 && selectedCards[0].dataset.lang === card.dataset.lang) {
                selectedCards[0].classList.remove('selected');
                selectedCards = [card];
                card.classList.add('selected');
                if (card.dataset.lang === 'en') speak(card.textContent);
                return;
            }

            if (card.dataset.lang === 'en') speak(card.textContent);
            card.classList.add('selected');
            selectedCards.push(card);

            if (selectedCards.length === 2) {
                const [c1, c2] = selectedCards;
                if (c1.dataset.pairId === c2.dataset.pairId) {
                    correctScore++;
                    document.getElementById('correct-count').textContent = correctScore;
                    c1.classList.replace('selected', 'matched');
                    c2.classList.replace('selected', 'matched');
                    checkRoundEnd();
                } else {
                    wrongScore++;
                    document.getElementById('wrong-count').textContent = wrongScore;
                    c1.classList.add('error-anim');
                    c2.classList.add('error-anim');
                    setTimeout(() => {
                        c1.classList.remove('selected', 'error-anim');
                        c2.classList.remove('selected', 'error-anim');
                    }, 500);
                }
                selectedCards = [];
            }
        }

        function checkRoundEnd() {
            // Ждем, пока на экране закончатся карточки
            if (document.querySelectorAll('.card:not(.matched)').length === 0) {
                setTimeout(() => {
                    document.querySelectorAll('.card').forEach(c => c.classList.add('ghost-out'));
                    
                    setTimeout(() => {
                        // Только когда экран пуст, проверяем мешочек
                        if (pool.length > 0) {
                            initRound();
                        } else {
                            // МЕШОЧЕК ПУСТ - МАРАФОН ОКОНЧЕН
                            showResults();
                        }
                    }, 2000);
                }, 1000);
            }
        }

        function showResults() {
            document.getElementById('game-ui').style.opacity = '0';
            const screen = document.getElementById('result-screen');
            document.getElementById('final-ok').textContent = correctScore;
            document.getElementById('final-err').textContent = wrongScore;
            screen.style.display = 'flex';
            setTimeout(() => screen.style.opacity = '1', 100);
        }

        function restartGame() {
            correctScore = 0;
            wrongScore = 0;
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('wrong-count').textContent = '0';
            document.getElementById('result-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('result-screen').style.display = 'none';
                document.getElementById('game-ui').style.opacity = '1';
                pool = [...allWords].sort(() => 0.5 - Math.random());
                initRound();
            }, 1000);
        }

        pool = [...allWords].sort(() => 0.5 - Math.random());
        initRound();
    </script>
</body>
</html>

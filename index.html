<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnCa Practice</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="image.png">

    <style>
        :root {
            --bg: #e0e5ec;
            --card-bg: #e0e5ec;
            --shadow: 7px 7px 14px #bec8d9, -7px -7px 14px #ffffff;
            --inner-shadow: inset 4px 4px 8px #bec8d9, inset -4px -4px 8px #ffffff;
            --accent: #4A90E2;
            --correct: #34c759;
            --wrong: #ff3b30;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .stats-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
        }

        .stat-card {
            flex: 1;
            padding: 15px;
            background: var(--bg);
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
            font-weight: bold;
        }

        #correct-count { color: var(--correct); font-size: 1.2em; }
        #wrong-count { color: var(--wrong); font-size: 1.2em; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px 10px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 80px;
            border: none;
            color: #333;
        }

        .card.selected { box-shadow: var(--inner-shadow); color: var(--accent); transform: scale(0.98); }
        .card.matched { visibility: hidden; opacity: 0; }
        .card.error { background-color: #ffdce0; color: var(--wrong); }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-card">✅ <span id="correct-count">0</span></div>
        <div class="stat-card">❌ <span id="wrong-count">0</span></div>
    </div>

    <div class="grid" id="game-grid"></div>

    <script>
        const words = [
            { en: "I am boring", ru: "Я скучный" },
            { en: "Cut out", ru: "Прекратить" },
            { en: "After you", ru: "После вас" },
            { en: "Not much", ru: "Ничего особенного" },
            { en: "I'm easy", ru: "Мне все равно" },
            { en: "It's on me", ru: "Я угощаю" },
            { en: "Slipped my mind", ru: "Вылетело из головы" }
        ];

        let correctScore = 0;
        let wrongScore = 0;
        let selectedCards = [];

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function initGame() {
            const grid = document.getElementById('game-grid');
            const gameWords = [...words].sort(() => 0.5 - Math.random()).slice(0, 4);
            let cards = [];
            
            gameWords.forEach(pair => {
                cards.push({ text: pair.en, lang: 'en', pairId: pair.en });
                cards.push({ text: pair.ru, lang: 'ru', pairId: pair.en });
            });

            cards.sort(() => 0.5 - Math.random()).forEach(data => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = data.text;
                card.dataset.lang = data.lang;
                card.dataset.pairId = data.pairId;
                card.onclick = () => handleCardClick(card);
                grid.appendChild(card);
            });
        }

        function handleCardClick(card) {
            if (card.classList.contains('selected') || card.classList.contains('matched')) return;

            if (card.dataset.lang === 'en') speak(card.textContent);

            card.classList.add('selected');
            selectedCards.push(card);

            if (selectedCards.length === 2) {
                const [c1, c2] = selectedCards;
                if (c1.dataset.pairId === c2.dataset.pairId && c1.dataset.lang !== c2.dataset.lang) {
                    correctScore++;
                    document.getElementById('correct-count').textContent = correctScore;
                    setTimeout(() => {
                        c1.classList.add('matched');
                        c2.classList.add('matched');
                        checkWin();
                    }, 300);
                } else {
                    wrongScore++;
                    document.getElementById('wrong-count').textContent = wrongScore;
                    c1.classList.add('error');
                    c2.classList.add('error');
                    setTimeout(() => {
                        c1.classList.remove('selected', 'error');
                        c2.classList.remove('selected', 'error');
                    }, 500);
                }
                selectedCards = [];
            }
        }

        function checkWin() {
            if (document.querySelectorAll('.card:not(.matched)').length === 0) {
                setTimeout(() => {
                    document.getElementById('game-grid').innerHTML = '';
                    initGame();
                }, 500);
            }
        }

        initGame();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnCa Practice</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="image.png">

    <style>
        :root {
            --bg: #e0e5ec;
            --card-bg: #e0e5ec;
            --shadow: 7px 7px 14px #bec8d9, -7px -7px 14px #ffffff;
            --inner-shadow: inset 4px 4px 8px #bec8d9, inset -4px -4px 8px #ffffff;
            --accent: #4A90E2;
            --correct: #34c759;
            --wrong: #ff3b30;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .stats-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
        }
        .stat-card {
            flex: 1;
            padding: 15px;
            background: var(--bg);
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
            font-weight: bold;
        }
        #correct-count { color: var(--correct); }
        #wrong-count { color: var(--wrong); }

        .game-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .column-title {
            text-align: center;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .card {
            background: var(--card-bg);
            padding: 15px 10px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 70px;
            border: 2px solid transparent;
            color: #333;
        }
        .card.selected { box-shadow: var(--inner-shadow); color: var(--accent); }
        .card.matched { border-color: var(--correct); color: var(--correct); pointer-events: none; }
        .card.error { border-color: var(--wrong); color: var(--wrong); }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-card">✅ <span id="correct-count">0</span></div>
        <div class="stat-card">❌ <span id="wrong-count">0</span></div>
    </div>

    <div class="game-container">
        <div class="column" id="en-column">
            <div class="column-title">English</div>
        </div>
        <div class="column" id="ru-column">
            <div class="column-title">Русский</div>
        </div>
    </div>

    <script>
        const allWords = [
            { en: "It slipped my mind", ru: "Вылетело из головы" },
            { en: "That's on me", ru: "Я виноват / Это моя вина" },
            { en: "Cut it out", ru: "Прекрати это" },
            { en: "After you", ru: "После вас" },
            { en: "I'm easy", ru: "Я за любой вариант" },
            { en: "Not much", ru: "Ничего особенного" },
            { en: "I am boring", ru: "Я скучный" },
            { en: "Keep in touch", ru: "Оставайся на связи" },
            { en: "Never mind", ru: "Неважно / Забудь" },
            { en: "No way", ru: "Ни за что" },
            { en: "Take your time", ru: "Не торопись" },
            { en: "You bet", ru: "Еще бы / Конечно" },
            { en: "By the way", ru: "Кстати" },
            { en: "Count me in", ru: "Я в деле" },
            { en: "I doubt it", ru: "Сомневаюсь" },
            { en: "It depends", ru: "Зависит от обстоятельств" },
            { en: "Sounds good", ru: "Звучит неплохо" },
            { en: "Take it easy", ru: "Расслабься" }
        ];

        let correctScore = 0;
        let wrongScore = 0;
        let selectedCards = [];

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        function initGame() {
            const enCol = document.getElementById('en-column');
            const ruCol = document.getElementById('ru-column');
            
            // Очищаем колонки кроме заголовков
            enCol.querySelectorAll('.card').forEach(c => c.remove());
            ruCol.querySelectorAll('.card').forEach(c => c.remove());

            const gameWords = [...allWords].sort(() => 0.5 - Math.random()).slice(0, 6);
            
            let enCards = gameWords.map(p => ({ text: p.en, pairId: p.en, lang: 'en' }));
            let ruCards = gameWords.map(p => ({ text: p.ru, pairId: p.en, lang: 'ru' }));

            enCards.sort(() => 0.5 - Math.random()).forEach(data => createCard(data, enCol));
            ruCards.sort(() => 0.5 - Math.random()).forEach(data => createCard(data, ruCol));
        }

        function createCard(data, container) {
            const card = document.createElement('div');
            card.className = 'card';
            card.textContent = data.text;
            card.dataset.lang = data.lang;
            card.dataset.pairId = data.pairId;
            card.onclick = () => handleCardClick(card);
            container.appendChild(card);
        }

        function handleCardClick(card) {
            if (card.classList.contains('selected') || card.classList.contains('matched')) return;

            if (card.dataset.lang === 'en') speak(card.textContent);

            card.classList.add('selected');
            selectedCards.push(card);

            if (selectedCards.length === 2) {
                const [c1, c2] = selectedCards;
                if (c1.dataset.pairId === c2.dataset.pairId && c1.dataset.lang !== c2.dataset.lang) {
                    correctScore++;
                    document.getElementById('correct-count').textContent = correctScore;
                    c1.classList.add('matched');
                    c2.classList.add('matched');
                    c1.classList.remove('selected');
                    c2.classList.remove('selected');
                    checkWin();
                } else {
                    wrongScore++;
                    document.getElementById('wrong-count').textContent = wrongScore;
                    c1.classList.add('error');
                    c2.classList.add('error');
                    setTimeout(() => {
                        c1.classList.remove('selected', 'error');
                        c2.classList.remove('selected', 'error');
                    }, 500);
                }
                selectedCards = [];
            }
        }

        function checkWin() {
            if (document.querySelectorAll('.card.matched').length === 12) {
                setTimeout(initGame, 1000);
            }
        }

        initGame();
    </script>
</body>
</html>

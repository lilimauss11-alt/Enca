<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnCa Practice</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="image.png">

    <style>
        :root {
            --bg: #e0e5ec;
            --card-bg: #e0e5ec;
            --shadow: 7px 7px 14px #bec8d9, -7px -7px 14px #ffffff;
            --inner-shadow: inset 4px 4px 8px #bec8d9, inset -4px -4px 8px #ffffff;
            --accent: #4A90E2;
            --correct-bg: #d4edda;
            --correct-text: #155724;
            --wrong-bg: #f8d7da;
            --wrong-text: #721c24;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .stats-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
        }
        .stat-card {
            flex: 1;
            padding: 15px;
            background: var(--bg);
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
            font-weight: bold;
        }
        .game-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .column-title {
            text-align: center;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .card {
            background: var(--card-bg);
            padding: 15px 10px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 70px;
            border: 2px solid transparent;
            color: #333;
        }
        .card.selected { box-shadow: var(--inner-shadow); color: var(--accent); }
        .card.matched { 
            background-color: var(--correct-bg); 
            color: var(--correct-text); 
            border-color: #c3e6cb;
            pointer-events: none;
            box-shadow: none;
        }
        .card.error { 
            background-color: var(--wrong-bg); 
            color: var(--wrong-text); 
            border-color: #f5c6cb;
        }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-card">✅ <span id="correct-count">0</span></div>
        <div class="stat-card">❌ <span id="wrong-count">0</span></div>
    </div>

    <div class="game-container">
        <div id="en-column" class="column"><div class="column-title">English</div></div>
        <div id="ru-column" class="column"><div class="column-title">Русский</div></div>
    </div>

    <script>
        const allWords = [
            { en: "It slipped my mind", ru: "Вылетело из головы" },
            { en: "That's on me", ru: "Я виноват / Это моя вина" },
            { en: "Cut it out", ru: "Прекрати это" },
            { en: "After you", ru: "После вас" },
            { en: "I'm easy", ru: "Я за любой вариант" },
            { en: "Not much", ru: "Ничего особенного" },
            { en: "I am boring", ru: "Я скучный" },
            { en: "I'm bored", ru: "Мне скучно" },
            { en: "Keep in touch", ru: "На связи" },
            { en: "Never mind", ru: "Неважно" },
            { en: "Take it easy", ru: "Расслабься" },
            { en: "You bet", ru: "Еще бы" }
        ];

        let correctScore = 0;
        let wrongScore = 0;
        let selectedCards = [];

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        function initGame() {
            const enCol = document.getElementById('en-column');
            const ruCol = document.getElementById('ru-column');
            enCol.querySelectorAll('.card').forEach(c => c.remove());
            ruCol.querySelectorAll('.card').forEach(c => c.remove());

            const gameWords = [...allWords].sort(() => 0.5 - Math.random()).slice(0, 6);
            
            // Английские карточки в левую колонку
            [...gameWords].sort(() => 0.5 - Math.random()).forEach(pair => {
                createCard(pair.en, pair.en, 'en', enCol);
            });

            // Русские карточки в правую колонку
            [...gameWords].sort(() => 0.5 - Math.random()).forEach(pair => {
                createCard(pair.ru, pair.en, 'ru', ruCol);
            });
        }

        function createCard(text, pairId, lang, container) {
            const card = document.createElement('div');
            card.className = 'card';
            card.textContent = text;
            card.dataset.lang = lang;
            card.dataset.pairId = pairId;
            card.onclick = () => handleCardClick(card);
            container.appendChild(card);
        }

        function handleCardClick(card) {
            if (card.classList.contains('selected') || card.classList.contains('matched')) return;
            if (card.dataset.lang === 'en') speak(card.textContent);

            card.classList.add('selected');
            selectedCards.push(card);

            if (selectedCards.length === 2) {
                const [c1, c2] = selectedCards;
                if (c1.dataset.pairId === c2.dataset.pairId && c1.dataset.lang !== c2.dataset.lang) {
                    correctScore++;
                    document.getElementById('correct-count').textContent = correctScore;
                    c1.classList.add('matched');
                    c2.classList.add('matched');
                    c1.classList.remove('selected');
                    c2.classList.remove('selected');
                    checkWin();
                } else {
                    wrongScore++;
                    document.getElementById('wrong-count').textContent = wrongScore;
                    c1.classList.add('error');
                    c2.classList.add('error');
                    setTimeout(() => {
                        c1.classList.remove('selected', 'error');
                        c2.classList.remove('selected', 'error');
                    }, 500);
                }
                selectedCards = [];
            }
        }

        function checkWin() {
            if (document.querySelectorAll('.card.matched').length === 12) {
                setTimeout(initGame, 1000);
            }
        }

        initGame();
    </script>
</body>
</html>

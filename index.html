<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnCa Pro - Final Design</title>
    <link rel="apple-touch-icon" href="image.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #e0e5ec;
            --shadow: 7px 7px 14px #bec8d9, -7px -7px 14px #ffffff;
            --inner-shadow: inset 4px 4px 8px #bec8d9, inset -4px -4px 8px #ffffff;
            --icon-red: #b31d35;
            --icon-green: #108a50;
            --accent: #4A90E2;
            --correct: #34c759;
            --wrong: #ff3b30;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; min-height: 100vh;
        }

        /* ГЛАВНОЕ МЕНЮ */
        #menu-screen { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 400px; text-align: center; }
        .menu-title { font-size: 48px; font-weight: 900; margin: 20px 0; letter-spacing: -1px; }
        .t-en, .t-me { color: var(--icon-green); }
        .t-ca, .t-nyu { color: var(--icon-red); }

        /* ВЫПУКЛЫЕ НАСТРОЙКИ */
        .settings-panel {
            background: var(--bg); padding: 20px; border-radius: 20px; box-shadow: var(--shadow);
            margin-bottom: 25px; display: flex; flex-direction: column; gap: 15px; font-size: 14px;
        }
        .setting-row { display: flex; justify-content: space-between; align-items: center; }
        select { border: none; background: var(--bg); box-shadow: var(--inner-shadow); padding: 8px 12px; border-radius: 12px; outline: none; font-weight: bold; color: #555; }

        .menu-btn {
            padding: 20px; border-radius: 18px; background: var(--bg);
            box-shadow: var(--shadow); cursor: pointer; font-weight: bold; font-size: 16px;
            transition: 0.3s; border: none; text-align: center;
        }
        .menu-btn.btn-listen { color: white; background: var(--icon-green); }
        .menu-btn.btn-classic { color: white; background: var(--icon-red); }
        .menu-btn:active { transform: scale(0.96); box-shadow: var(--inner-shadow); }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        #game-ui { display: none; width: 100%; max-width: 600px; }
        .stats-container { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; justify-content: center; }
        .stat-card { flex: 1; padding: 12px; background: var(--bg); border-radius: 12px; box-shadow: var(--shadow); text-align: center; font-size: 14px; font-weight: bold; }
        
        /* КНОПКА МЕНЮ ВНИЗУ */
        .bottom-nav { width: 100%; display: flex; justify-content: center; margin-top: 30px; margin-bottom: 20px; }
        .back-menu-btn {
            padding: 15px 30px; border-radius: 15px; background: var(--bg);
            box-shadow: var(--shadow); cursor: pointer; transition: 0.2s;
            font-weight: 900; font-size: 16px; text-transform: uppercase;
        }
        .back-menu-btn:active { box-shadow: var(--inner-shadow); transform: scale(0.95); }

        .columns-container { display: flex; gap: 12px; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .column-title { text-align: center; font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }

        .card {
            min-height: 85px; background: var(--bg); padding: 10px; border-radius: 18px; box-shadow: var(--shadow);
            display: flex; align-items: center; justify-content: center; text-align: center;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; color: #333;
        }
        .card.selected { box-shadow: var(--inner-shadow); color: var(--accent); }
        .card.matched { background-color: #d1e7dd; color: #666; box-shadow: none; border: 1px solid #b8dcc5; }
        .card.error-anim { background-color: var(--wrong); color: white; }
        
        .card.hidden-en { color: transparent !important; position: relative; }
        .card.hidden-en::after { content: '🔊'; font-size: 26px; color: #888; position: absolute; }

        #writing-mode { display: none; flex-direction: column; align-items: center; gap: 20px; }
        .write-card { width: 100%; padding: 40px; background: var(--bg); border-radius: 20px; box-shadow: var(--shadow); text-align: center; font-size: 22px; font-weight: bold; color: var(--icon-red); }
        .write-input { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--bg); box-shadow: var(--inner-shadow); font-size: 18px; text-align: center; outline: none; }
    </style>
</head>
<body>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="menu-screen">
        <div class="menu-title"><span class="t-en">En</span><span class="t-ca">Ca</span></div>
        
        <div class="settings-panel">
            <div class="setting-row">
                <span>Скорость речи:</span>
                <select id="speech-rate">
                    <option value="0.6">Медленно</option>
                    <option value="0.9" selected>Нормально</option>
                    <option value="1.2">Быстро</option>
                </select>
            </div>
            <div class="setting-row">
                <span>Голос:</span>
                <select id="voice-gender">
                    <option value="female">Женский</option>
                    <option value="male">Мужской</option>
                </select>
            </div>
        </div>

        <button class="menu-btn btn-listen" onclick="startGame('listening')">🎧 НА СЛУХ</button>
        <button class="menu-btn btn-classic" onclick="startGame('classic')">🧩 КЛАССИКА</button>
        <button class="menu-btn" style="color: var(--icon-green); border: 2px solid" onclick="startGame('writing')">✍️ ПИСЬМО</button>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="game-ui">
        <div class="stats-container">
            <div class="stat-card">✅ <span id="correct-count">0</span></div>
            <div class="stat-card">❌ <span id="wrong-count">0</span></div>
            <div class="stat-card" style="color: var(--icon-red)">🗂️ <span id="pool-count">0</span></div>
        </div>

        <div id="matching-columns" class="columns-container">
            <div id="en-column" class="column"><div class="column-title">English</div></div>
            <div id="ru-column" class="column"><div class="column-title">Русский</div></div>
        </div>

        <div id="writing-mode">
            <div id="target-ru" class="write-card">...</div>
            <input type="text" id="user-input" class="write-input" placeholder="Переведи..." autocomplete="off">
        </div>

        <div class="bottom-nav">
            <div class="back-menu-btn" onclick="backToMenu()">
                <span class="t-me">Ме</span><span class="t-nyu">Ню</span>
            </div>
        </div>
    </div>

            { en: "Too hard", ru: "Слишком сложно" }, { en: "Worth it", ru: "Оно стоит того" },

            { en: "No idea", ru: "Без понятия" }, { en: "Can't tell", ru: "Не могу сказать" },
            { en: "Kinda", ru: "типо того" }, { en: "I don't care", ru: "Мне всё равно" },
            { en: "Whatever you say", ru: "Как скажешь" }, { en: "You started it", ru: "Ты начал" },
            { en: "That's not true", ru: "Неправда" }, { en: "I doubt it", ru: "Сомневаюсь" },
            { en: "You wish", ru: "Мечтай" }, { en: "Not my fault", ru: "Не моя вина" },
            { en: "Don't blame me", ru: "Не вини меня" }, { en: "Let it go", ru: "Забудь" },
            { en: "Drop it", ru: "Оставь это" }, { en: "Could I have", ru: "могу ли я" },
            { en: "That’s why", ru: "поэтому" }, { en: "Don’t trip", ru: "не твое дело" },
            { en: "he didn make it", ru: "он не выжил" }, { en: "still young", ru: "всё ещё молодой" },
            { en: "I am boring", ru: "я скучный" }, { en: "I’m Broke", ru: "нет денег" },
            { en: "I’m running late", ru: "я опаздываю" }, { en: "That works", ru: "договорились" },
            { en: "I am interesting", ru: "я интересный" }, { en: "Make yourself at home", ru: "как дома" },
            { en: "It slipped my mind", ru: "Вылетело из головы" }, { en: "That's on me", ru: "Это из-за меня" },
            { en: "Let me get back to you", ru: "На связи" }, { en: "I'm all set", ru: "Нет, спасибо" },
            { en: "It is what it is", ru: "Что есть, то есть" }
        ];

        let pool = [];
        let currentGameMode = '';
        let correctCount = 0, wrongCount = 0;
        let selectedCards = [];
        let currentWritingWord = null;

        function getVoice() {
            const voices = window.speechSynthesis.getVoices();
            const gender = document.getElementById('voice-gender').value;
            return voices.find(v => v.lang.startsWith('en') && (gender === 'male' ? v.name.includes('Male') || v.name.includes('Daniel') : v.name.includes('Female') || v.name.includes('Samantha'))) || voices.find(v => v.lang.startsWith('en'));
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = parseFloat(document.getElementById('speech-rate').value);
            msg.voice = getVoice();
            window.speechSynthesis.speak(msg);
        }

        function startGame(mode) {
            currentGameMode = mode;
            correctCount = 0; wrongCount = 0;
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('wrong-count').textContent = '0';
            pool = [...allWords].sort(() => Math.random() - 0.5);
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            if (mode === 'writing') {
                document.getElementById('matching-columns').style.display = 'none';
                document.getElementById('writing-mode').style.display = 'flex';
                nextWritingWord();
            } else {
                document.getElementById('matching-columns').style.display = 'flex';
                document.getElementById('writing-mode').style.display = 'none';
                initMatchingRound();
            }
        }

        function backToMenu() {
            window.speechSynthesis.cancel();
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
        }

        function initMatchingRound() {
            if (pool.length === 0) return backToMenu();
            const enCol = document.getElementById('en-column');
            const ruCol = document.getElementById('ru-column');
            Array.from(enCol.children).forEach(c => !c.classList.contains('column-title') && c.remove());
            Array.from(ruCol.children).forEach(c => !c.classList.contains('column-title') && c.remove());
            let roundWords = pool.splice(0, 6);
            let shuffledRu = [...roundWords].sort(() => Math.random() - 0.5);
            roundWords.forEach(w => enCol.appendChild(createCard(w.en, w.en, 'en')));
            shuffledRu.forEach(w => ruCol.appendChild(createCard(w.ru, w.en, 'ru')));
            document.getElementById('pool-count').textContent = pool.length;
        }

        function createCard(text, pairId, lang) {
            const card = document.createElement('div');
            card.className = 'card';
            if (lang === 'en' && currentGameMode === 'listening') card.classList.add('hidden-en');
            card.textContent = text;
            card.dataset.lang = lang;
            card.dataset.pairId = pairId;
            card.onclick = () => handleCardClick(card);
            return card;
        }

        function handleCardClick(card) {
            if (card.dataset.lang === 'en' && (card.classList.contains('matched') || card.classList.contains('selected'))) {
                speak(card.textContent);
                return;
            }
            if (card.classList.contains('matched')) return;
            if (selectedCards.length === 1 && selectedCards[0].dataset.lang === card.dataset.lang) {
                selectedCards[0].classList.remove('selected');
                selectedCards = [card];
                card.classList.add('selected');
                if (card.dataset.lang === 'en') speak(card.textContent);
                return;
            }
            if (card.dataset.lang === 'en') speak(card.textContent);
            card.classList.add('selected');
            selectedCards.push(card);
            if (selectedCards.length === 2) {
                const [c1, c2] = selectedCards;
                if (c1.dataset.pairId === c2.dataset.pairId) {
                    correctCount++;
                    c1.classList.remove('hidden-en'); c2.classList.remove('hidden-en');
                    c1.classList.add('matched'); c2.classList.add('matched');
                    c1.classList.remove('selected'); c2.classList.remove('selected');
                    if (document.querySelectorAll('.card:not(.matched):not(.column-title)').length === 0) {
                        setTimeout(initMatchingRound, 800);
                    }
                } else {
                    wrongCount++;
                    c1.classList.add('error-anim'); c2.classList.add('error-anim');
                    setTimeout(() => {
                        c1.classList.remove('selected', 'error-anim');
                        c2.classList.remove('selected', 'error-anim');
                    }, 400);
                }
                selectedCards = [];
                document.getElementById('correct-count').textContent = correctCount;
                document.getElementById('wrong-count').textContent = wrongCount;
            }
        }

        function nextWritingWord() {
            if (pool.length === 0) return backToMenu();
            currentWritingWord = pool.pop();
            document.getElementById('target-ru').textContent = currentWritingWord.ru;
            document.getElementById('user-input').value = '';
            document.getElementById('pool-count').textContent = pool.length;
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (e.target.value.trim().toLowerCase() === currentWritingWord.en.toLowerCase()) {
                    correctCount++;
                    speak(currentWritingWord.en);
                    nextWritingWord();
                } else {
                    wrongCount++;
                    alert('Верно: ' + currentWritingWord.en);
                }
                document.getElementById('correct-count').textContent = correctCount;
                document.getElementById('wrong-count').textContent = wrongCount;
            }
        });
        
        window.speechSynthesis.onvoiceschanged = getVoice;
    </script>
</body>
</html>

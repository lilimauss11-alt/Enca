<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnCa - Final Marathon</title>
    <link rel="apple-touch-icon" href="image.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #e0e5ec;
            --shadow: 7px 7px 14px #bec8d9, -7px -7px 14px #ffffff;
            --inner-shadow: inset 4px 4px 8px #bec8d9, inset -4px -4px 8px #ffffff;
            --accent: #4A90E2;
            --correct: #34c759;
            --wrong: #ff3b30;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; min-height: 100vh;
        }
        .stats-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .stat-card { flex: 1; padding: 12px; background: var(--bg); border-radius: 12px; box-shadow: var(--shadow); text-align: center; font-size: 14px; font-weight: bold; }
        
        .game-container { display: flex; gap: 15px; width: 100%; max-width: 600px; transition: opacity 1s; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .column-title { text-align: center; font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }

        .card {
            min-height: 70px; background: var(--bg); padding: 10px; border-radius: 12px; box-shadow: var(--shadow);
            display: flex; align-items: center; justify-content: center; text-align: center;
            font-size: 13px; font-weight: 500; cursor: pointer; color: #333;
            transition: opacity 1.2s ease, background-color 0.4s, color 0.4s;
        }
        .card.selected { box-shadow: var(--inner-shadow); color: var(--accent); }
        .card.matched { background-color: #d1e7dd; color: #a0a0a0; pointer-events: none; box-shadow: none; border: 1px solid #c3e6cb; }
        .card.just-matched { background-color: var(--correct) !important; color: white !important; }
        .card.ghost-out { opacity: 0; pointer-events: none; }
        .card.error-anim { background-color: var(--wrong); color: white; }

        /* Финальное окно */
        #result-screen {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 350px; background: var(--bg); border-radius: 30px;
            box-shadow: var(--shadow); padding: 30px; text-align: center;
            display: none; flex-direction: column; gap: 20px; z-index: 100;
            opacity: 0; transition: opacity 2s ease;
        }
        .res-val { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .btn-restart {
            padding: 15px; border-radius: 15px; border: none; background: var(--bg);
            box-shadow: var(--shadow); color: var(--accent); font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-card">✅ <span id="correct-count">0</span></div>
        <div class="stat-card">❌ <span id="wrong-count">0</span></div>
        <div class="stat-card" style="color: var(--accent)">📦 <span id="pool-count">0</span></div>
    </div>

    <div id="game-ui" class="game-container">
        <div id="en-column" class="column"><div class="column-title">English</div></div>
        <div id="ru-column" class="column"><div class="column-title">Русский</div></div>
    </div>

    <div id="result-screen">
        <h2>Марафон пройден!</h2>
        <p>Вы изучили все 160 фраз.</p>
        <div style="color: var(--correct)">Всего верно: <div id="final-ok" class="res-val">0</div></div>
        <div style="color: var(--wrong)">Ошибок: <div id="final-err" class="res-val">0</div></div>
        <button class="btn-restart" onclick="restartGame()">Начать новый круг</button>
    </div>

        let pool = [];
        let selectedCards = [];
        let correctScore = 0;
        let wrongScore = 0;

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function refreshPool() {
            pool = shuffle([...allWords]);
            updateStats();
        }

        function updateStats() {
            document.getElementById('pool-count').textContent = pool.length;
            document.getElementById('correct-count').textContent = correctScore;
            document.getElementById('wrong-count').textContent = wrongScore;
        }

        function initRound() {
            const enCol = document.getElementById('en-column');
            const ruCol = document.getElementById('ru-column');
            
            Array.from(enCol.children).forEach(c => { if(!c.classList.contains('column-title')) c.remove(); });
            Array.from(ruCol.children).forEach(c => { if(!c.classList.contains('column-title')) c.remove(); });

            let count = Math.min(6, pool.length);
            let roundWords = pool.splice(0, count);
            let shuffledRu = shuffle([...roundWords]);

            roundWords.forEach(p => enCol.appendChild(createCard(p.en, p.en, 'en')));
            shuffledRu.forEach(p => ruCol.appendChild(createCard(p.ru, p.en, 'ru')));
            updateStats();
        }

        function createCard(text, pairId, lang) {
            const card = document.createElement('div');
            card.className = 'card';
            card.textContent = text;
            card.dataset.lang = lang;
            card.dataset.pairId = pairId;
            card.onclick = () => handleCardClick(card);
            return card;
        }

        function handleCardClick(card) {
            if (card.classList.contains('selected') || card.classList.contains('matched')) return;

            if (selectedCards.length === 1 && selectedCards[0].dataset.lang === card.dataset.lang) {
                selectedCards[0].classList.remove('selected');
                selectedCards = [card];
                card.classList.add('selected');
                if (card.dataset.lang === 'en') speak(card.textContent);
                return;
            }

            if (card.dataset.lang === 'en') speak(card.textContent);
            card.classList.add('selected');
            selectedCards.push(card);

            if (selectedCards.length === 2) {
                const [c1, c2] = selectedCards;
                if (c1.dataset.pairId === c2.dataset.pairId) {
                    correctScore++;
                    c1.classList.add('just-matched');
                    c2.classList.add('just-matched');
                    setTimeout(() => {
                        c1.classList.replace('just-matched', 'matched');
                        c2.classList.replace('just-matched', 'matched');
                        checkRoundEnd();
                    }, 500);
                } else {
                    wrongScore++;
                    c1.classList.add('error-anim');
                    c2.classList.add('error-anim');
                    setTimeout(() => {
                        c1.classList.remove('selected', 'error-anim');
                        c2.classList.remove('selected', 'error-anim');
                    }, 400);
                }
                selectedCards = [];
                updateStats();
            }
        }

        function checkRoundEnd() {
            if (document.querySelectorAll('.card:not(.matched):not(.column-title):not(.just-matched)').length === 0) {
                setTimeout(() => {
                    document.querySelectorAll('.card:not(.column-title)').forEach(c => c.classList.add('ghost-out'));
                    
                    setTimeout(() => {
                        if (pool.length > 0) {
                            initRound();
                        } else {
                            showResults();
                        }
                    }, 1200);
                }, 600);
            }
        }

        function showResults() {
            document.getElementById('game-ui').style.opacity = '0';
            const screen = document.getElementById('result-screen');
            document.getElementById('final-ok').textContent = correctScore;
            document.getElementById('final-err').textContent = wrongScore;
            screen.style.display = 'flex';
            setTimeout(() => screen.style.opacity = '1', 100);
        }

        function restartGame() {
            correctScore = 0;
            wrongScore = 0;
            document.getElementById('result-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('result-screen').style.display = 'none';
                document.getElementById('game-ui').style.opacity = '1';
                refreshPool();
                initRound();
            }, 1000);
        }

        refreshPool();
        initRound();
    </script>

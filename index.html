<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnCa - MultiMode</title>
    <link rel="apple-touch-icon" href="image.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #e0e5ec;
            --shadow: 7px 7px 14px #bec8d9, -7px -7px 14px #ffffff;
            --inner-shadow: inset 4px 4px 8px #bec8d9, inset -4px -4px 8px #ffffff;
            --accent: #4A90E2;
            --correct: #34c759;
            --wrong: #ff3b30;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; min-height: 100vh;
        }

        /* МЕНЮ */
        #menu-screen {
            display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 400px; text-align: center; margin-top: 50px;
        }
        .menu-btn {
            padding: 25px; border-radius: 20px; background: var(--bg);
            box-shadow: var(--shadow); cursor: pointer; font-weight: bold; font-size: 18px;
            transition: 0.3s; border: none; color: #444;
        }
        .menu-btn:active { box-shadow: var(--inner-shadow); transform: scale(0.98); }
        .menu-btn span { display: block; font-size: 12px; color: #888; font-weight: normal; margin-top: 5px; }

        /* ИГРОВАЯ ЗОНА */
        #game-ui { display: none; width: 100%; max-width: 600px; }
        .stats-container { display: flex; gap: 8px; margin-bottom: 20px; }
        .stat-card { flex: 1; padding: 12px; background: var(--bg); border-radius: 12px; box-shadow: var(--shadow); text-align: center; font-size: 13px; font-weight: bold; }
        
        .columns-container { display: flex; gap: 15px; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .column-title { text-align: center; font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }

        .card {
            min-height: 70px; background: var(--bg); padding: 10px; border-radius: 12px; box-shadow: var(--shadow);
            display: flex; align-items: center; justify-content: center; text-align: center;
            font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.4s;
        }
        .card.selected { box-shadow: var(--inner-shadow); color: var(--accent); }
        .card.matched { background-color: #d1e7dd; color: #a0a0a0; pointer-events: none; box-shadow: none; }
        .card.just-matched { background-color: var(--correct) !important; color: white !important; }
        .card.error-anim { background-color: var(--wrong); color: white; }
        .card.hidden-en { color: transparent; position: relative; }
        .card.hidden-en::after { content: '🔊'; color: #888; font-size: 20px; position: absolute; }

        /* РЕЖИМ ПИСЬМА */
        #writing-mode { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .write-card { 
            width: 100%; padding: 40px 20px; background: var(--bg); border-radius: 20px; 
            box-shadow: var(--shadow); text-align: center; font-size: 20px; font-weight: bold; 
        }
        .write-input {
            width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--bg);
            box-shadow: var(--inner-shadow); font-size: 18px; text-align: center; outline: none;
        }

        /* ФИНАЛ */
        #result-screen {
            display: none; flex-direction: column; gap: 20px; text-align: center; padding: 30px;
            background: var(--bg); border-radius: 30px; box-shadow: var(--shadow);
        }
    </style>
</head>
<body>

    <!-- ЭКРАН МЕНЮ -->
    <div id="menu-screen">
        <h1 style="color: var(--accent); margin-bottom: 10px;">EnCa Menu</h1>
        <button class="menu-btn" onclick="startGame('listening')">🔊 На слух<span>Английский скрыт, слушай звук</span></button>
        <button class="menu-btn" onclick="startGame('classic')">🧩 Найди пару<span>Классический марафон</span></button>
        <button class="menu-btn" onclick="startGame('writing')">✍️ Перевод<span>Напиши фразу на английском</span></button>
    </div>

    <!-- ИГРОВОЙ ИНТЕРФЕЙС -->
    <div id="game-ui">
        <div class="stats-container">
            <div class="stat-card">✅ <span id="correct-count">0</span></div>
            <div class="stat-card">❌ <span id="wrong-count">0</span></div>
            <div class="stat-card" style="color: var(--accent)">📦 <span id="pool-count">0</span></div>
        </div>

        <!-- Контейнер для режимов 1 и 2 -->
        <div id="matching-columns" class="columns-container">
            <div id="en-column" class="column"><div class="column-title">English</div></div>
            <div id="ru-column" class="column"><div class="column-title">Русский</div></div>
        </div>

        <!-- Контейнер для режима 3 -->
        <div id="writing-mode">
            <div id="target-ru" class="write-card">Русская фраза</div>
            <input type="text" id="user-input" class="write-input" placeholder="Type in English..." autocomplete="off">
            <p id="writing-feedback" style="font-weight: bold; min-height: 1.2em;"></p>
        </div>
    </div>

    <!-- ЭКРАН РЕЗУЛЬТАТОВ -->
    <div id="result-screen">
        <h2>🎉 Готово!</h2>
        <div style="font-size: 18px;">
            Верно: <span id="final-ok" style="color: var(--correct)">0</span><br>
            Ошибок: <span id="final-err" style="color: var(--wrong)">0</span>
        </div>
        <button class="menu-btn" onclick="location.reload()">В меню</button>
    </div>

            { en: "Not worth it", ru: "Не стоит" }, { en: "Sounds bad", ru: "Звучит плохо" },
            { en: "No idea", ru: "Без понятия" }, { en: "Can't tell", ru: "Не могу сказать" },
            { en: "Kinda", ru: "типо того" }, { en: "I don't care", ru: "Мне всё равно" },
            { en: "Whatever you say", ru: "Как скажешь" }, { en: "You started it", ru: "Ты начал" },

            { en: "Don't blame me", ru: "Не вини меня" }, { en: "Let it go", ru: "Забудь" },
            { en: "Drop it", ru: "Оставь это" }, { en: "Could I have", ru: "могу ли я" },
            { en: "That’s why", ru: "поэтому" }, { en: "Don’t trip", ru: "не твое дело" },
            { en: "he didn make it", ru: "он не выжил" }, { en: "still young", ru: "еще молодой" },
            { en: "I am boring", ru: "я скучный" }, { en: "I’m Broke", ru: "нет денег" },
            { en: "I’m running late", ru: "опаздываю" }, { en: "That works", ru: "договорились" },
            { en: "I am interesting", ru: "я интересный" }, { en: "Make yourself at home", ru: "как дома" },
            { en: "It slipped my mind", ru: "Вылетело из головы" }, { en: "That's on me", ru: "Моя вина" },
            { en: "Let me get back to you", ru: "На связи" }, { en: "I'm all set", ru: "Нет, спасибо" },

        let pool = [];
        let currentGameMode = '';
        let correctCount = 0, wrongCount = 0;
        let selectedCards = [];
        let currentWritingWord = null;

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function shuffle(arr) {
            return arr.sort(() => Math.random() - 0.5);
        }

        function startGame(mode) {
            currentGameMode = mode;
            pool = shuffle([...allWords]);
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            
            if (mode === 'writing') {
                document.getElementById('matching-columns').style.display = 'none';
                document.getElementById('writing-mode').style.display = 'flex';
                nextWritingWord();
                
                // Обработка Enter в инпуте
                document.getElementById('user-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkWritingAnswer();
                });
            } else {
                initMatchingRound();
            }
        }

        /* ЛОГИКА ДЛЯ РЕЖИМОВ 1 И 2 */
        function initMatchingRound() {
            if (pool.length === 0) return showFinalResults();
            
            const enCol = document.getElementById('en-column');
            const ruCol = document.getElementById('ru-column');
            
            // Очистка
            Array.from(enCol.children).forEach(c => !c.classList.contains('column-title') && c.remove());
            Array.from(ruCol.children).forEach(c => !c.classList.contains('column-title') && c.remove());

            let count = Math.min(6, pool.length);
            let roundWords = pool.splice(0, count);
            let shuffledRu = shuffle([...roundWords]);

            roundWords.forEach(w => enCol.appendChild(createCard(w.en, w.en, 'en')));
            shuffledRu.forEach(w => ruCol.appendChild(createCard(w.ru, w.en, 'ru')));
            updateStats();
        }

        function createCard(text, pairId, lang) {
            const card = document.createElement('div');
            card.className = 'card';
            if (lang === 'en' && currentGameMode === 'listening') card.classList.add('hidden-en');
            card.textContent = text;
            card.dataset.lang = lang;
            card.dataset.pairId = pairId;
            card.onclick = () => handleCardClick(card);
            return card;
        }

        function handleCardClick(card) {
            if (card.classList.contains('selected') || card.classList.contains('matched')) return;

            // Переключение в одном столбце
            if (selectedCards.length === 1 && selectedCards[0].dataset.lang === card.dataset.lang) {
                selectedCards[0].classList.remove('selected');
                selectedCards = [card];
                card.classList.add('selected');
                if (card.dataset.lang === 'en') {
                    speak(card.textContent);
                    card.classList.remove('hidden-en');
                }
                return;
            }

            if (card.dataset.lang === 'en') {
                speak(card.textContent);
                card.classList.remove('hidden-en');
            }
            card.classList.add('selected');
            selectedCards.push(card);

            if (selectedCards.length === 2) {
                const [c1, c2] = selectedCards;
                if (c1.dataset.pairId === c2.dataset.pairId) {
                    correctCount++;
                    c1.classList.add('just-matched'); c2.classList.add('just-matched');
                    setTimeout(() => {
                        c1.classList.replace('just-matched', 'matched');
                        c2.classList.replace('just-matched', 'matched');
                        if (document.querySelectorAll('.card:not(.matched):not(.column-title):not(.just-matched)').length === 0) {
                            setTimeout(initMatchingRound, 800);
                        }
                    }, 500);
                } else {
                    wrongCount++;
                    c1.classList.add('error-anim'); c2.classList.add('error-anim');
                    setTimeout(() => {
                        c1.classList.remove('selected', 'error-anim');
                        c2.classList.remove('selected', 'error-anim');
                        if (currentGameMode === 'listening') {
                            if (c1.dataset.lang === 'en') c1.classList.add('hidden-en');
                            if (c2.dataset.lang === 'en') c2.classList.add('hidden-en');
                        }
                    }, 400);
                }
                selectedCards = [];
                updateStats();
            }
        }

        /* ЛОГИКА ДЛЯ РЕЖИМА 3 (ПИСЬМО) */
        function nextWritingWord() {
            if (pool.length === 0) return showFinalResults();
            currentWritingWord = pool.pop();
            document.getElementById('target-ru').textContent = currentWritingWord.ru;
            document.getElementById('user-input').value = '';
            document.getElementById('writing-feedback').textContent = '';
            updateStats();
        }

        function checkWritingAnswer() {
            const input = document.getElementById('user-input');
            const feedback = document.getElementById('writing-feedback');
            const userVal = input.value.trim().toLowerCase();
            const correctVal = currentWritingWord.en.toLowerCase();

            if (userVal === correctVal) {
                correctCount++;
                feedback.style.color = 'var(--correct)';
                feedback.textContent = 'Correct! ✨';
                speak(currentWritingWord.en);
                setTimeout(nextWritingWord, 1000);
            } else {
                wrongCount++;
                feedback.style.color = 'var(--wrong)';
                feedback.textContent = `Error! Right: ${currentWritingWord.en}`;
                input.value = '';
            }
            updateStats();
        }

        function updateStats() {
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('wrong-count').textContent = wrongCount;
            document.getElementById('pool-count').textContent = pool.length;
        }

        function showFinalResults() {
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('final-ok').textContent = correctCount;
            document.getElementById('final-err').textContent = wrongCount;
        }
    </script>
</body>
</html>

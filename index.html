<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnCa Ghostly</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="image.png">

    <style>
        :root {
            --bg: #e0e5ec;
            --card-bg: #e0e5ec;
            --shadow: 7px 7px 14px #bec8d9, -7px -7px 14px #ffffff;
            --inner-shadow: inset 4px 4px 8px #bec8d9, inset -4px -4px 8px #ffffff;
            --accent: #4A90E2;
            --correct-bg: #34c759;
            --wrong-bg: #ff3b30;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; min-height: 100vh;
        }
        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .stat-card { flex: 1; padding: 15px; background: var(--bg); border-radius: 15px; box-shadow: var(--shadow); text-align: center; font-weight: bold; }
        
        .game-container { display: flex; gap: 15px; width: 100%; max-width: 600px; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .column-title { text-align: center; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }

        .card {
            background: var(--card-bg); padding: 12px 8px; border-radius: 12px; box-shadow: var(--shadow);
            display: flex; align-items: center; justify-content: center; text-align: center;
            font-size: 13px; font-weight: 500; cursor: pointer;
            min-height: 70px; border: 2px solid transparent; color: #333;
            /* Плавность для всех изменений */
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        background-color 0.8s ease, 
                        transform 0.8s ease, 
                        box-shadow 0.4s;
            opacity: 1;
        }

        .card.selected { box-shadow: var(--inner-shadow); color: var(--accent); }
        
        /* Эффект призрачного исчезновения */
        .card.ghost-out { 
            opacity: 0;
            background-color: var(--correct-bg);
            color: white;
            pointer-events: none;
        }

        /* Эффект призрачного появления */
        .card.ghost-in {
            animation: ghostAppear 1.5s ease-out forwards;
        }

        @keyframes ghostAppear {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card.error-anim { 
            background-color: var(--wrong-bg); 
            color: white;
            transition: background-color 0.3s;
        }

        .card.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stat-card">✅ <span id="correct-count">0</span></div>
        <div class="stat-card">❌ <span id="wrong-count">0</span></div>
    </div>

    <div class="game-container">
        <div id="en-column" class="column"><div class="column-title">English</div></div>
        <div id="ru-column" class="column"><div class="column-title">Русский</div></div>
    </div>

    <script>
        const allWords = [
            { en: "It slipped my mind", ru: "Вылетело из головы" },
            { en: "That's on me", ru: "Я виноват / Моя вина" },
            { en: "Cut it out", ru: "Прекрати это" },
            { en: "After you", ru: "После вас" },
            { en: "I'm easy", ru: "Я за любой вариант" },
            { en: "Not much", ru: "Ничего особенного" },
            { en: "I am boring", ru: "Я скучный" },
            { en: "I'm bored", ru: "Мне скучно" },
            { en: "Keep in touch", ru: "На связи" },
            { en: "Never mind", ru: "Неважно" },
            { en: "Take it easy", ru: "Расслабься" },
            { en: "Go ahead", ru: "Давай" },
            { en: "By the way", ru: "Кстати" },
            { en: "What's up?", ru: "Как дела?" },
            { en: "Count me in", ru: "Я в деле" },
            { en: "Sounds good", ru: "Звучит неплохо" },
            { en: "I mean it", ru: "Я серьезно" },
            { en: "Check it out", ru: "Зацени" }
        ];

        let pool = [...allWords].sort(() => 0.5 - Math.random());
        let correctScore = 0;
        let wrongScore = 0;
        let selectedCards = [];

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        function createCard(text, pairId, lang) {
            const card = document.createElement('div');
            card.className = 'card ghost-in';
            card.textContent = text;
            card.dataset.lang = lang;
            card.dataset.pairId = pairId;
            card.onclick = () => handleCardClick(card);
            return card;
        }

        function initGame() {
            const enCol = document.getElementById('en-column');
            const ruCol = document.getElementById('ru-column');
            const initialSet = pool.splice(0, 6);
            
            initialSet.forEach(pair => {
                enCol.appendChild(createCard(pair.en, pair.en, 'en'));
                ruCol.appendChild(createCard(pair.ru, pair.en, 'ru'));
            });
            shuffleColumns();
        }

        function shuffleColumns() {
            const enCol = document.getElementById('en-column');
            const ruCol = document.getElementById('ru-column');
            [enCol, ruCol].forEach(col => {
                const cards = Array.from(col.querySelectorAll('.card:not(.hidden)'));
                cards.sort(() => 0.5 - Math.random()).forEach(c => col.appendChild(c));
            });
        }

        function handleCardClick(card) {
            if (card.classList.contains('selected') || card.classList.contains('ghost-out')) return;
            if (card.dataset.lang === 'en') speak(card.textContent);

            card.classList.add('selected');
            selectedCards.push(card);

            if (selectedCards.length === 2) {
                const [c1, c2] = selectedCards;
                if (c1.dataset.pairId === c2.dataset.pairId && c1.dataset.lang !== c2.dataset.lang) {
                    processCorrect(c1, c2);
                } else {
                    processWrong(c1, c2);
                }
                selectedCards = [];
            }
        }

        function processCorrect(c1, c2) {
            correctScore++;
            document.getElementById('correct-count').textContent = correctScore;
            
            // Медленно растворяем
            c1.classList.add('ghost-out');
            c2.classList.add('ghost-out');

            setTimeout(() => {
                if (pool.length > 0) {
                    const nextPair = pool.shift();
                    // Заменяем и медленно проявляем
                    updateCard(c1, nextPair);
                    updateCard(c2, nextPair);
                    shuffleColumns();
                } else {
                    c1.classList.add('hidden');
                    c2.classList.add('hidden');
                }
            }, 1200); // Время на полное растворение
        }

        function updateCard(card, pair) {
            card.classList.remove('selected', 'ghost-out', 'ghost-in');
            void card.offsetWidth; // Рестарт анимации
            card.classList.add('ghost-in');
            
            if (card.dataset.lang === 'en') {
                card.textContent = pair.en;
                card.dataset.pairId = pair.en;
            } else {
                card.textContent = pair.ru;
                card.dataset.pairId = pair.en;
            }
        }

        function processWrong(c1, c2) {
            wrongScore++;
            document.getElementById('wrong-count').textContent = wrongScore;
            c1.classList.add('error-anim');
            c2.classList.add('error-anim');
            setTimeout(() => {
                c1.classList.remove('selected', 'error-anim');
                c2.classList.remove('selected', 'error-anim');
            }, 500);
        }

        initGame();
    </script>
</body>
</html>
